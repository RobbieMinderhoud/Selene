<!-- Selene · E · Filled-S — solid S silhouette, left side filled (yin-yang style). Drop shadow. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4493f8"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-20%" width="180%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0a0e1a" flood-opacity="0.28"/>
    </filter>
  </defs>
  <!--
    S silhouette, left side filled solid:
      · Top arc   — centre (50,30) r=20, sweeps LEFT  (counter-clockwise, sweep=0) → (50,10)→(50,50)
      · Bottom arc — centre (50,70) r=20, sweeps RIGHT (clockwise,         sweep=1) → (50,50)→(50,90)
      · Closed by a straight line on the right at x=50
    The left boundary traces a smooth S-curve; the right edge is a clean vertical cut.
  -->
  <path
    d="M 50 10 A 20 20 0 0 0 50 50 A 20 20 0 0 1 50 90 L 50 10 Z"
    fill="url(#acc)"
    filter="url(#shadow)"
  />
</svg>
