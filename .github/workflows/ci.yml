name: CI

# Test + lint pipeline. Runs on every pull request and on pushes to main, so
# regressions are caught before merge/release. (Bundle building lives in
# build.yml and only runs on v* tags / manual dispatch.)
on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same branch/PR cancels the previous, still-running run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the pipeline only reads the repo.
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting (Prettier)
        run: pnpm format:check

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Type-check (tsc)
        run: pnpm typecheck

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Production build (tsc + vite)
        run: pnpm build

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Tauri's build script links against the system WebKitGTK/GTK libraries,
      # so the src-tauri crate only compiles on Linux once these are installed.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file

      # tauri-build requires the frontendDist (../dist) to exist to compile.
      # CI only needs the crate to build/test, not a real UI, so a stub is
      # enough; the frontend job above covers the actual production build.
      - name: Create stub frontend dist
        run: |
          mkdir -p dist
          printf '<!doctype html><title>ci</title>' > dist/index.html

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          # Cargo workspace root (target/ lives here, not under src-tauri/).
          workspaces: .

      - name: Check formatting (rustfmt)
        run: cargo fmt --all --check

      - name: Lint (Clippy, warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        # Integration tests are #[ignore]-d (need Docker) and run in
        # integration.yml, so this stays fast and dependency-free.
        run: cargo test --workspace

      # The additional drivers (sqlx sqlite/postgres/mysql + mongodb) are behind
      # off-by-default features, so the default workspace build above does not
      # compile or test them. Lint + test them all together here to guard the
      # drivers and the shared layers on every PR. Their Docker-backed integration
      # tests are #[ignore]-d (run in integration.yml), so without `--ignored` only
      # the unit tests and SQLite's in-process integration tests run — fast and
      # dependency-free.
      - name: Lint additional drivers (Clippy)
        run: cargo clippy -p selene-core --features "sqlite postgres mysql mongodb" --all-targets -- -D warnings

      - name: Tests (additional drivers)
        run: cargo test -p selene-core --features "sqlite postgres mysql mongodb"
