name: Integration tests

# Dockerized integration tests: testcontainers spins up real SQL Server,
# PostgreSQL, and MySQL servers (ephemeral host ports, no 1433/5432/3306 clash).
# Kept off the per-PR path to keep PR feedback fast and avoid the image pulls on
# every PR — runs nightly and on demand from the Actions tab.
on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: Database integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # selene-core has no Tauri/WebKitGTK dependency, but it does pull in
      # keyring's `sync-secret-service` backend, which links libdbus via
      # libdbus-sys. Without libdbus-1-dev (+ pkg-config) the build script
      # panics with "pkg_config failed".
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: integration

      # selene-core has zero Tauri dependency, so no WebKitGTK/GTK deps are
      # needed here. testcontainers talks to the Docker daemon that is
      # preinstalled on GitHub's ubuntu runners.
      # Scope each step to its own integration test binary: a bare `-- --ignored`
      # would also run the lib's `live_keychain_round_trip` test, which is
      # `#[ignore = "...run manually"]` and needs a real Secret Service daemon
      # (absent on headless runners). The two drivers are run as separate steps
      # so each enables only its own backend feature.
      - name: Run MSSQL integration tests
        run: cargo test -p selene-core --features mssql --test mssql_integration -- --ignored

      - name: Run PostgreSQL integration tests
        run: cargo test -p selene-core --features postgres --test postgres_integration -- --ignored

      - name: Run MySQL integration tests
        run: cargo test -p selene-core --features mysql --test mysql_integration -- --ignored

      - name: Run MongoDB integration tests
        run: cargo test -p selene-core --features mongodb --test mongodb_integration -- --ignored
