name: Build

# Build installable bundles for Windows and macOS.
# - workflow_dispatch: build on demand from the Actions tab.
# - push of a v* tag: a release tag also produces both artifacts.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest # WebView2 Evergreen runtime is preinstalled
          - os: macos-latest # Apple Silicon -> aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          # Cargo workspace root (target/ lives here, not under src-tauri/).
          workspaces: .
          key: ${{ matrix.os }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Runs beforeBuildCommand (pnpm build = tsc && vite build), then bundles
      # for the host OS. Output lands under target/release/bundle/ (workspace root).
      - name: Build app
        run: pnpm tauri build

      - name: Upload bundles
        uses: actions/upload-artifact@v6
        with:
          name: selene-${{ matrix.os }}
          # Cargo workspace: target/ is at the repo root, not under src-tauri/.
          # upload-artifact's glob has no brace expansion; list patterns instead.
          path: |
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.dmg
          if-no-files-found: error
